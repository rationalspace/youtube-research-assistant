channels:
  - url: "https://www.youtube.com/@theskippodcast"
    handle: "@theskippodcast"
  - url: "https://www.youtube.com/@PeterYangYT"
    handle: "@PeterYangYT"
  - url: "https://www.youtube.com/@MaheshAIPMCommunity"
    handle: "@MaheshAIPMCommunity"

videos_per_channel: 2
enable_reading_queue: true

prompt: |
  Summarize this product management / AI video for a senior product leader.
  Write in two parts — no other sections, no tags, no headers beyond what is specified below.

  PART 1 — SUMMARY
  Write 1–2 paragraphs of flowing prose, depending on how much substance the video has.
  A rich, dense video deserves two paragraphs. A short clip or thin content gets one.
  Cover: what the video is actually about, the core insight or argument, any specific
  details worth knowing (tools, frameworks, numbers), and why it matters to a product leader.
  Be direct and specific — not generic. If the video is low-substance, say so honestly
  in one sentence and skip the second paragraph.

  PART 2 — ACTION ITEMS
  A short bulleted list (2–4 items max) of concrete things worth doing or investigating
  based on this video. Each item should be a single sentence, specific and actionable.
  Only include items that are genuinely worth acting on — do not pad the list.
  If there is only one real action item, write only one bullet.

  Rules:
  - No numbered sections. No markdown headers (##). No [TAG] annotations.
  - No exhaustive lists of every tool or person mentioned.
  - You may use **bold** sparingly for a tool name or key term.
  - The two parts should be separated by a blank line and the label "Action items:" on its own line.

  Video: {title}
  Channel: {channel}

  Transcript:
  {transcript}
